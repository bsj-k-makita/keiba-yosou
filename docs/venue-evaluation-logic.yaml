contextual_inputs:
  horse_optional_fields:
    - sex
    - age
    - frameNumber
    - jockey
    - trainer
    - bodyWeightKg
    - pedigree.sireName
    - pedigree.damSireName
    - pedigree.courseFit01
    - pedigree.distanceFit01
    - pedigree.maleStayerFit01
    - pedigree.femaleMiddleFit01
    - signals.jockeyCourseWinRate01
    - signals.jockeyCoursePlaceRate01
    - signals.trainerCourseWinRate01
    - signals.trainerCoursePlaceRate01
    - pastRuns[].tripTrouble01
    - pastRuns[].tripBenefit01
  race_optional_fields:
    - trackBiasStrength01
    - turnCount
    - section200mSec
  design_note: "未入力時は中立(0点)として処理し、従来ロジックと同一挙動を維持。"

contextual_bonus_layer:
  pedigree_bonus:
    purpose: "血統のコース/距離適性を加点減点"
    range: "[-4.0, +4.0]"
    notes:
      - "courseFit01 / distanceFit01 を中心化して評価"
      - "牡馬中長距離・牝馬2000m以下など性別×距離バイアスを反映"
      - "種牡馬名ベースのヒューリスティック(例: ルーラーシップ, スワーヴリチャード)を補助利用"
  gate_bias_bonus:
    purpose: "枠順×当日トラックバイアス(内有利/外有利)の物理補正"
    range: "[-4.0, +4.0]"
    notes:
      - "inside_favor / outside_favor のときのみ適用"
      - "turnCount が多いほど内外有利を増幅"
  connections_bonus:
    purpose: "騎手・調教師の対象コース実績を反映"
    range: "[-4.0, +4.0]"
    notes:
      - "jockey/trainer の win/place rate(0-1)を基準値差で評価"
      - "コース条件に特化した名称ベース補助ルールを併用"
  trend_bonus:
    purpose: "年齢・馬体重など客観傾向を反映"
    range: "[-3.0, +3.0]"
    notes:
      - "長距離では4-5歳を加点、6歳以上を減点"
      - "長距離では460kg未満(極端な軽量除く)を加点"
  pace_balance_bonus:
    purpose: "前後傾差適性(瞬発偏重 vs 消耗耐性)を反映"
    range: "[-3.0, +3.0]"
    notes:
      - "過去走ラップから front-last 差を推定"
      - "当該レースの前後傾(または pace 既定値)との一致度で評価"
  trip_context_bonus:
    purpose: "前走の不利/恩恵を評価に反映"
    range: "[-2.5, +2.5]"
    notes:
      - "tripTrouble01(不利)は加点方向"
      - "tripBenefit01(恩恵)は減点方向"

adjustment_strength:
  weak: 0.5
  middle: 1.0
  strong: 1.5

weight_resolution:
  min_weight: 0.05
  max_weight: 0.45
  process:
    - "venue base weights を取得（courseKey優先、無ければvenue、未定義なら東京）"
    - "ground + bias + pace の delta を合算"
    - "adjustmentStrength を掛けて base に加算"
    - "各軸を [0.05, 0.45] にクランプ"
    - "5軸合計が1になるよう正規化"

scoring_pipeline:
  base_ability_core:
    formula: "5軸平均 * 0.75 + 上位2軸平均 * 0.25"
  intrinsic_ability_score:
    formula: "baseAbilityCore + reproducibilityDelta - riskPenalty"
  condition_score:
    formula: "sum(ability[axis] * finalWeight[axis])"
  race_adjusted_input:
    default_formula: "intrinsic * 0.45 + conditionScore * 0.55 + classLevelBonus * 0.9"
    with_max_performance_formula: "intrinsic * 0.35 + conditionScore * 0.45 + maxPerformance * 0.2 + classLevelBonus * 0.9"
  race_relative_score:
    zscore:
      rel_min: 35
      rel_max: 85
      z_scale: 8
      std_floor: 2
    fallback_minmax: "標準偏差が小さい場合は35-85のmin-max"
  pace_fit_bonus:
    "◎": 5
    "○": 2
    "△": 0
    "×": -5
  final_evaluation_score:
    formula: "clamp(0, 100, raceRelative + paceFitBonus + lapShapeFitBonus + distanceFitBonus + classLevelBonus + (pedigreeBonus + gateBiasBonus + connectionsBonus + trendBonus + paceBalanceBonus + tripContextBonus) - variancePenalty)"

ranking:
  base_rank: "baseScore 降順"
  adjusted_rank: "adjustedScore 降順"
  final_rank: "finalEvaluationScore 降順"

marks:
  by_final_rank:
    1: "◎"
    2: "○"
    3: "▲"
    4: "△"
    5: "△"
  star_rule:
    symbol: "☆"
    conditions:
      - "最終順位が6位以下"
      - "baseRank - finalRank >= 3"
      - "scoreDiff >= 0.5"

dismiss_logic:
  threshold: "4条件中2件以上で消し候補"
  conditions:
    - "finalRank > (頭数 - 2)"
    - "fitLevel == 低"
    - "paceFit == ×"
    - "scoreDiff <= -1.0"

buy_label_assignment:
  rank_based:
    1: "本命候補"
    2: "対抗"
    3: "単穴"
    "4-5":
      scoreDiff_gte_3: "穴候補"
      otherwise: "相手"
    "6+": "消し"
  post_filter:
    - "消し候補IDは強制で『消し』"
    - "本命候補でも longshot guard 条件で『相手』へ降格する場合あり"
